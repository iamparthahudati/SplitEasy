<svg xmlns="http://www.w3.org/2000/svg" width="390" height="880" viewBox="0 0 390 844">

  <!-- Background -->
  <rect width="390" height="844" fill="#1E1B4B"/>

  <!-- Gradient overlay -->
  <rect x="0" y="380" width="390" height="464" fill="#312E81" opacity="0.7"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="44" fill="rgba(0,0,0,0.2)"/>
  <text x="20" y="28" font-size="15" fill="white" font-weight="600" font-family="system-ui, -apple-system, sans-serif">9:41</text>

  <!-- Logo mark -->
  <!-- Left link -->
  <rect x="168" y="119" width="36" height="22" rx="11" fill="#6366F1"/>
  <!-- Left cutout -->
  <rect x="177" y="125" width="18" height="10" rx="5" fill="#1E1B4B"/>
  <!-- Right link -->
  <rect x="192" y="119" width="36" height="22" rx="11" fill="#A5B4FC"/>
  <!-- Right cutout -->
  <rect x="201" y="125" width="18" height="10" rx="5" fill="#1E1B4B"/>

  <!-- Wordmark -->
  <text x="195" y="165" text-anchor="middle" font-size="28" font-weight="700" fill="white" letter-spacing="0.4" font-family="system-ui, -apple-system, sans-serif">SplitEasy</text>

  <!-- Welcome heading -->
  <text x="195" y="220" text-anchor="middle" font-size="22" font-weight="600" fill="white" font-family="system-ui, -apple-system, sans-serif">Welcome back</text>

  <!-- Trust line -->
  <text x="195" y="248" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.6)" font-family="system-ui, -apple-system, sans-serif">Your friends never need to download anything.</text>

  <!-- Glass card -->
  <rect x="20" y="272" width="350" height="296" rx="24" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- Apple button -->
  <rect x="44" y="296" width="302" height="56" rx="14" fill="#000000"/>
  <text x="130" y="330" font-size="20" fill="white" font-family="system-ui, -apple-system, sans-serif" dominant-baseline="middle"></text>
  <text x="210" y="330" font-size="16" font-weight="600" fill="white" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">Sign in with Apple</text>

  <!-- Google button -->
  <rect x="44" y="368" width="302" height="56" rx="14" fill="white"/>
  <text x="120" y="402" font-size="16" font-weight="700" fill="#4285F4" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">G</text>
  <text x="210" y="402" font-size="16" font-weight="500" fill="#0F172A" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">Sign in with Google</text>

  <!-- Divider -->
  <line x1="44" y1="444" x2="346" y2="444" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
  <text x="195" y="449" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.4)" font-family="system-ui, -apple-system, sans-serif">or</text>

  <!-- Email button -->
  <rect x="44" y="456" width="302" height="56" rx="14" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="195" y="490" text-anchor="middle" font-size="16" font-weight="600" fill="white" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">Continue with Email</text>

  <!-- Guest button -->
  <rect x="44" y="524" width="302" height="44" rx="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="195" y="552" text-anchor="middle" font-size="14" font-weight="500" fill="rgba(255,255,255,0.5)" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif">Continue without account</text>

  <!-- Trust badge -->
  <text x="195" y="596" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.35)" font-family="system-ui, -apple-system, sans-serif">  Encrypted and private</text>

  <!-- iPhone frame -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Screen label -->
  <text x="195" y="870" text-anchor="middle" font-size="13" fill="#64748B" font-weight="600" font-family="system-ui, -apple-system, sans-serif">03 — Sign In Screen</text>

</svg>
